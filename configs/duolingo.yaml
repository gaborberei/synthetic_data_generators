# =============================================================================
# Duolingo — the DAILY-GRAIN streak/habit dataset
# =============================================================================
# A language-learning app whose core loop is the DAILY streak. Unlike every
# other config here, this one runs on the engine's `grain: daily` path
# (see generator.py::_simulate_daily): each user is stepped day by day, and a
# day's return probability rises with the current streak (habit forming) and
# decays with days-since-active once a streak breaks. Notifications nudge idle
# users back; a streak freeze protects a streak across one missed day.
#
# The signal an analyst can recover here:
#   * Streak length predicts next-day return (habit), and a streak break
#     predicts churn.
#   * A notification A/B test ("smart_notifications") lifts reactivation.
#   * Early behaviour (first lessons, first 7-day streak) predicts week-N
#     retention — feeds the activation-moment methodology on a real daily grain.

dataset_name: duolingo
base_event: lesson_completed   # the core production event (one per lesson done)
grain: daily                   # selects the per-day simulation path

global_settings:
  base_users: 110          # new learners in the first weekly signup cohort
  growth_rate: 0.015       # week-over-week growth in new signups (1.5%)
  start_date: "2024-01-01" # first cohort (a Monday); week 0 = January = NY peak
  periods_to_simulate: 52  # cohorts still ARRIVE weekly; each is then simulated daily

# -----------------------------------------------------------------------------
# Daily habit/return model.
#   return.*  active-streak users: streak == 1 day returns at `new_user`, long
#             streaks saturate toward `habit_max` at rate `habit_gain`. This is
#             the habit curve the analyst should be able to rediscover.
#   lapse.*   lapsed users: probability of coming back on idle day k is
#             base * decay^(k-1), never below `floor` (the daily analogue of the
#             weekly REAC/RESU resurrection arrows).
#   weekday_multipliers  mild day-of-week pattern (Mon..Sun); weekends dip.
# -----------------------------------------------------------------------------
daily:
  return:
    new_user: 0.55         # P(return tomorrow) for a brand-new 1-day streak
    habit_max: 0.93        # asymptotic daily return prob for a long streak
    habit_gain: 0.05       # how fast the habit saturates with streak length
  lapse:
    # Retention is weekly-ish: a learner who studies a few times a week misses
    # days constantly without churning, so a short idle gap must stay forgiving
    # (high base) and decay only as the gap grows.
    base: 0.42             # P(return) on the first idle day after a break
    decay: 0.78            # geometric decay per additional idle day
    floor: 0.004           # minimum daily resurrection prob (never quite zero)
  weekday_multipliers: [1.0, 1.0, 1.0, 1.0, 0.96, 0.86, 0.9]  # Mon..Sun

# -----------------------------------------------------------------------------
# Streak mechanics.
#   freeze_earn_every  earn one streak freeze per N consecutive active days,
#                      capped at `max_freezes`; a freeze is auto-spent to save
#                      the streak on a missed day (emits `streak_freeze_used`).
#   milestones         emit a `streak_milestone` event when a streak reaches one
#                      of these lengths.
#   emit_lost_min_streak  only emit `streak_lost` when the broken streak was at
#                      least this long (short streaks break silently).
# -----------------------------------------------------------------------------
streak:
  freeze_earn_every: 10
  max_freezes: 2
  milestones: [7, 14, 30, 50, 100, 200, 365]
  emit_lost_min_streak: 3

# -----------------------------------------------------------------------------
# Notifications. A daily reminder is sent to users idle between `idle_days_trigger`
# and `idle_days_max` days (apps stop nudging the long-dormant). With prob
# `open_rate` it is opened; an opened reminder multiplies that user's lapse
# return prob by `reactivation_boost`. The "smart_notifications" experiment below
# raises this boost for the treatment group — the readable reactivation lift.
# Emits `notification_sent` and `notification_opened`.
# -----------------------------------------------------------------------------
notifications:
  idle_days_trigger: 1
  idle_days_max: 14
  open_rate: 0.28
  reactivation_boost: 1.7

# -----------------------------------------------------------------------------
# Time-series realism. Seasonality is 1 + amp*cos(2*pi*week/52): peak at week 0
# (January New-Year-resolution surge), trough mid-year. The September
# back-to-school bump is added as acquisition `spikes`. AR(1) noise is shared
# across metrics so good weeks cluster; retention noise is dampened because
# daily retention compounds hard.
# -----------------------------------------------------------------------------
time_series:
  seasonality:
    period_weeks: 52
    acquisition_amp: 0.35    # strong January signup surge
    activity_amp: 0.12
    retention_amp: 0.03
  noise:
    phi: 0.6
    sigma: 0.05
    retention_power: 0.25
  user_variance_sigma: 0.50  # persistent per-learner engagement (lognormal)
  spikes:                     # back-to-school acquisition bump (weeks ~35-37)
    - {week: 35, multiplier: 1.4, description: "Back-to-school"}
    - {week: 36, multiplier: 1.5, description: "Back-to-school"}
    - {week: 37, multiplier: 1.3, description: "Back-to-school"}

# Study sessions cluster in the evening.
timestamps:
  peak_hour: 19

# -----------------------------------------------------------------------------
# Dimensions: per-learner attributes at signup, written on every event.
# Channel quality is real (referral retains best, paid worst), so segmented
# survival by channel is a genuine driver, not noise.
# -----------------------------------------------------------------------------
dimensions:
  acquisition_channel:
    values: {organic: 0.40, paid_search: 0.25, social: 0.25, referral: 0.10}
    retention_multiplier: {organic: 1.0, paid_search: 0.82, social: 0.88, referral: 1.15}
  course:
    values: {spanish: 0.32, french: 0.18, english: 0.20, german: 0.12, japanese: 0.10, italian: 0.08}
  platform:
    values: {ios: 0.42, android: 0.43, web: 0.15}
  country:
    values: {US: 0.30, IN: 0.14, BR: 0.12, MX: 0.10, DE: 0.10, FR: 0.08, JP: 0.08, UK: 0.08}

# -----------------------------------------------------------------------------
# Segments: how many lessons an active learner completes on an active day, and
# (via the habit model) how sticky they are. `committed` learners do more per
# day AND build longer streaks, so early activity predicts retention.
# -----------------------------------------------------------------------------
segments:
  dabbler:
    prob: 0.55
    retention_mult: 0.85   # tourists: churn fast
    activity_distribution: { type: poisson, lambda: 1.4 }
  regular:
    prob: 0.33
    retention_mult: 1.10   # steady weekly learners
    activity_distribution: { type: poisson, lambda: 3.0 }
  committed:
    prob: 0.12
    retention_mult: 1.30   # daily-habit power users
    activity_distribution: { type: poisson, lambda: 6.5 }

# -----------------------------------------------------------------------------
# Experiment: "smart_notifications" — better-timed reminders that raise the
# reactivation boost for treated learners. A clean, honest 50/50 test; the
# analyst should read out a positive reactivation lift with no SRM issues.
# -----------------------------------------------------------------------------
experiments:
  - name: smart_notifications
    start_week: 8
    end_week: 40
    assignment:
      ratio: 0.5
      scope: all_users
    effects:
      - type: notification
        multiplier: 1.35     # treated openers reactivate 35% more strongly
